<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Input UI</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="container">
        <h1>Upload an Image</h1>
        <!-- Custom file input label with plus icon -->
        <label for="imageInput" title="Choose an image">+</label>
        <!-- Image input field -->
        <input type="file" id="imageInput" accept="image/*">

        <!-- Preview image -->
        <img id="preview" alt="Preview">

        <!-- Result paragraphs -->
        <p id="result">Result: <span></span></p>
        <p id="confidence">Confidence: <span></span></p>
        <p id="conclusion">Conclusion: <span></span></p>
    </div>
<script src="script.js"></script>
</body>
</html>
